<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Institute | Augmented Data Analyst</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .blueprint-shadow { shadow-[20px_20px_0px_0px_rgba(37,99,235,1)]; }
    </style>
</head>
<body class="bg-[#fafafa]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            ChevronRight, ShieldCheck, Zap, Layers, Globe, 
            CheckCircle2, Menu, X, ArrowRight, Database, 
            Cpu, Search, BarChart3, Terminal, UserCheck, Briefcase 
        } = lucide;

        const App = () => {
            const [activePhase, setActivePhase] = useState(0);
            const [showApplyModal, setShowApplyModal] = useState(false);

            const programs = [
                {
                    phase: "01. THE LOGIC ARCHITECTURE",
                    title: "First-Principles Analysis",
                    description: "Before AI can work, the logic must be flawless. We master data modeling and relational theory—the DNA of all business intelligence.",
                    skills: ["Schema Design", "Relational Logic", "Data Integrity"]
                },
                {
                    phase: "02. THE ENGINE ROOM",
                    title: "Advanced Tech Stack",
                    description: "The professional's toolkit. Deep-dive into SQL architecture and Python scripting designed to handle massive, messy corporate datasets.",
                    skills: ["SQL Mastery", "Python Analytics", "Statistical Auditing"]
                },
                {
                    phase: "03. THE AI COMMAND",
                    title: "Augmented Intelligence",
                    description: "Learn to use AI as your co-pilot. Automate the grunt work while using your human logic to audit and validate every single output.",
                    skills: ["AI Validation", "Automated Pipelines", "Strategic Deployment"]
                }
            ];

            return (
                <div className="min-h-screen text-slate-900 font-sans antialiased">
                    {/* Navigation */}
                    <nav className="fixed w-full z-[60] bg-white/95 backdrop-blur-md border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="w-12 h-12 bg-blue-600 flex items-center justify-center rounded-lg shadow-lg shadow-blue-200">
                                    <i data-lucide="bar-chart-3" class="text-white w-7 h-7"></i>
                                </div>
                                <div className="flex flex-col leading-none">
                                    <span className="font-black text-xl tracking-tighter uppercase">The Institute</span>
                                    <span className="text-[10px] font-bold tracking-[0.3em] text-blue-600">AUGMENTED DATA</span>
                                </div>
                            </div>

                            <div className="hidden md:flex items-center space-x-12 text-[12px] font-black tracking-[0.15em] text-slate-500">
                                <a href="#programs" className="hover:text-blue-600 transition-colors uppercase">The Career Path</a>
                                <a href="#organizations" className="hover:text-blue-600 transition-colors uppercase">Enterprise Hub</a>
                            </div>

                            <div className="flex items-center space-x-4">
                                <button className="hidden sm:block text-[11px] font-black tracking-widest px-7 py-3.5 border-2 border-slate-900 hover:bg-slate-900 hover:text-white transition-all uppercase">
                                    Hire Talent
                                </button>
                                <button 
                                    onClick={() => setShowApplyModal(true)}
                                    className="bg-blue-600 text-white text-[11px] font-black tracking-widest px-7 py-3.5 hover:bg-blue-700 transition-all uppercase shadow-xl shadow-blue-100"
                                >
                                    Apply to Join
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="pt-32 lg:pt-44 pb-16 px-6 relative overflow-hidden bg-white">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-[1.2fr_0.8fr] gap-12 items-center">
                            <div className="space-y-10 z-10">
                                <div className="inline-flex items-center space-x-4 px-6 py-3 bg-blue-600 text-white rounded-sm shadow-xl shadow-blue-100 transform -rotate-1">
                                    <span className="relative flex h-3 w-3">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-100 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
                                    </span>
                                    <span className="text-[13px] font-black tracking-[0.1em] uppercase">Enrollment Open: 2026 Sessions</span>
                                </div>
                                
                                <h1 className="text-6xl lg:text-8xl font-black leading-[0.95] tracking-tighter text-slate-900 uppercase">
                                    Become the<br />
                                    <span className="text-blue-600">Augmented</span><br />
                                    Data Analyst.
                                </h1>
                                
                                <p className="text-2xl text-slate-500 max-w-xl leading-relaxed font-medium">
                                    Logic-First. AI-Fast. <br />
                                    <span className="text-slate-900">Don't just prompt. Architect the insight.</span>
                                </p>

                                <div className="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6 pt-4">
                                    <button 
                                        className="bg-slate-900 text-white px-10 py-6 font-black text-sm uppercase tracking-widest flex items-center justify-center hover:bg-blue-600 transition-all shadow-2xl shadow-slate-300"
                                    >
                                        The Career Path <i data-lucide="arrow-right" class="ml-3 w-5 h-5"></i>
                                    </button>
                                    <button className="border-2 border-slate-200 text-slate-900 px-10 py-6 font-black text-sm uppercase tracking-widest hover:border-slate-900 transition-all bg-transparent">
                                        Managed Talent Hub
                                    </button>
                                </div>
                            </div>
                            
                            {/* Blueprint Visual */}
                            <div className="relative p-4">
                                <div className="absolute inset-0 bg-blue-50/50 rounded-full blur-3xl"></div>
                                <div className="relative border-4 border-slate-900 bg-white p-10 shadow-[20px_20px_0px_0px_rgba(37,99,235,1)]">
                                    <div className="space-y-6">
                                        <div className="bg-slate-50 p-5 border border-slate-100 flex items-center space-x-5">
                                            <div className="w-12 h-12 bg-white border border-slate-200 flex items-center justify-center rounded shadow-sm font-black text-blue-600">01</div>
                                            <div className="text-sm font-black text-slate-900 uppercase">Logic Architecture</div>
                                        </div>
                                        <div className="bg-blue-600 p-5 flex items-center space-x-5 shadow-xl shadow-blue-200">
                                            <div className="w-12 h-12 bg-white flex items-center justify-center rounded shadow-sm font-black text-blue-600">02</div>
                                            <div className="text-sm font-black text-white uppercase">Human Verification</div>
                                        </div>
                                        <div className="bg-slate-900 p-5 flex items-center space-x-5">
                                            <div className="w-12 h-12 bg-white/10 flex items-center justify-center rounded font-black text-blue-400">03</div>
                                            <div className="text-sm font-black text-white uppercase italic">AI Acceleration</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Pathway Section */}
                    <section id="programs" className="py-32 px-6 bg-[#fafafa]">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-16">
                            <div className="md:w-1/3 sticky top-32 h-fit space-y-8">
                                <h2 className="text-5xl font-black tracking-tighter uppercase leading-[0.95]">The Career<br />Evolution.</h2>
                                <div className="flex flex-col space-y-4">
                                    {programs.map((p, i) => (
                                        <button 
                                            key={i}
                                            onMouseEnter={() => setActivePhase(i)}
                                            className={`group text-left p-6 transition-all border-l-4 ${activePhase === i ? 'border-blue-600 bg-white shadow-xl shadow-slate-200' : 'border-slate-200 grayscale opacity-40'}`}
                                        >
                                            <span className="text-[10px] font-black text-blue-600 tracking-widest">{p.phase}</span>
                                            <h4 className="font-bold text-lg uppercase tracking-tight text-slate-900 mt-1">{p.title}</h4>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="md:w-2/3">
                                <div className="bg-white border-4 border-slate-900 p-12 shadow-[15px_15px_0px_0px_rgba(15,23,42,0.05)]">
                                    <h3 className="text-4xl font-black tracking-tighter uppercase text-slate-900 mb-8">{programs[activePhase].title}</h3>
                                    <p className="text-xl text-slate-500 leading-relaxed font-medium mb-12">{programs[activePhase].description}</p>
                                    <div className="grid sm:grid-cols-2 gap-6">
                                        {programs[activePhase].skills.map((s, idx) => (
                                            <div key={idx} className="flex items-center space-x-4 p-5 bg-slate-50 border border-slate-100">
                                                <i data-lucide="check-circle-2" class="text-blue-600 w-5 h-5 flex-shrink-0"></i>
                                                <span className="text-sm font-black uppercase tracking-widest text-slate-700">{s}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Enterprise Hub */}
                    <section id="organizations" className="py-32 px-6 bg-white border-t-2 border-slate-100">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
                            <div className="space-y-10">
                                <h2 className="text-5xl font-black tracking-tighter uppercase leading-[0.95]">The Vetted<br /><span className="text-blue-600 underline decoration-8 decoration-blue-100">Talent Bench.</span></h2>
                                <p className="text-xl text-slate-500 font-medium leading-relaxed">
                                    Companies don't need resumes. They need <strong>validated resources</strong>.
                                </p>
                            </div>
                            <div className="bg-slate-900 p-12 text-white border-8 border-slate-100 shadow-2xl">
                                <h3 className="text-2xl font-black uppercase tracking-tighter mb-8">Available Bench</h3>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center p-5 border-l-4 border-blue-500 bg-white/5">
                                        <span className="font-black uppercase tracking-tight text-sm">Senior Data Architect</span>
                                        <span className="text-[10px] font-black px-3 py-1 rounded-full bg-blue-600 text-white uppercase">Available</span>
                                    </div>
                                    <button className="w-full py-6 mt-8 bg-blue-600 text-white font-black uppercase tracking-widest text-xs hover:bg-blue-700 transition-all">
                                        Request Access
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-24 px-6 bg-slate-50 border-t border-slate-200 text-center">
                        <div className="flex flex-col items-center space-y-4">
                             <div className="flex items-center space-x-2">
                                <i data-lucide="bar-chart-3" class="text-slate-900 w-8 h-8"></i>
                                <span className="font-black text-2xl tracking-tighter uppercase">The Institute</span>
                             </div>
                             <p className="text-[10px] font-black tracking-[0.4em] text-slate-400 uppercase">Logic. Audit. Accelerate. © 2026</p>
                        </div>
                    </footer>

                    {/* Apply Modal */}
                    {showApplyModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-6">
                            <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm" onClick={() => setShowApplyModal(false)}></div>
                            <div className="relative bg-white max-w-xl w-full p-12 border-4 border-blue-600 shadow-2xl">
                                <button onClick={() => setShowApplyModal(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-900">
                                    <i data-lucide="x" class="w-6 h-6"></i>
                                </button>
                                <h2 className="text-4xl font-black tracking-tighter uppercase mb-6">The Admission Gate.</h2>
                                <p className="text-slate-500 mb-10 font-medium text-lg">Selective academy for high-performers.</p>
                                <div className="space-y-4">
                                    <button className="w-full p-6 text-left border-2 border-slate-100 hover:border-blue-600 flex items-center justify-between group transition-all">
                                        <span className="font-black uppercase tracking-tight text-slate-900">Career Transitioner</span>
                                        <i data-lucide="arrow-right" class="text-slate-200 group-hover:text-blue-600"></i>
                                    </button>
                                    <button className="w-full p-6 text-left border-2 border-slate-100 hover:border-blue-600 flex items-center justify-between group transition-all">
                                        <span className="font-black uppercase tracking-tight text-slate-900">Corporate Upskilling</span>
                                        <i data-lucide="arrow-right" class="text-slate-200 group-hover:text-blue-600"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Icons after rendering
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
